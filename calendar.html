<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calendar</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
<style>
  :root {
    --bg: #111111;
    --surface: #1a1a1a;
    --surface2: #202020;
    --surface3: #2a2a2a;
    --border: #2e2e2e;
    --border-light: #383838;
    --text-primary: #f0f0f0;
    --text-secondary: #999999;
    --text-muted: #555555;
    --accent-dim: rgba(255,255,255,0.06);
    --radius: 12px;
    --radius-sm: 7px;
    --sidebar-w: 64px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    height: 100vh;
    display: flex;
    overflow: hidden;
  }

  /* ── SIDEBAR ── */
  .sidebar {
    padding: 12px 8px;
    height: 100vh;
    width: var(--sidebar-w);
    background: #0d0d0d;
    border-right: 1px solid var(--border);
    transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    display: flex;
    flex-direction: column;
    gap: 4px;
    overflow: hidden;
    position: fixed;
    top: 0; left: 0;
    z-index: 200;
  }
  .sidebar.expanded { width: 220px; }

  .menu-item {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 8px;
    border-radius: 10px;
    cursor: pointer;
    text-decoration: none;
    color: rgba(255,255,255,0.45);
    transition: background 0.2s ease, color 0.2s ease;
    white-space: nowrap;
    min-height: 48px;
    position: relative;
    flex-shrink: 0;
  }
  .menu-item:hover { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.85); }
  .menu-item.active { color: white; }
  .menu-item.active::before {
    content: "";
    position: absolute;
    left: -8px; top: 50%;
    transform: translateY(-50%);
    height: 28px; width: 3px;
    background: white;
    border-radius: 2px;
  }
  .menu-toggle { margin-bottom: 16px; }

  .material-symbols-outlined {
    font-size: 26px;
    flex-shrink: 0;
    font-variation-settings: 'FILL' 0, 'wght' 250, 'GRAD' 0, 'opsz' 24;
  }
  .menu-item.active .material-symbols-outlined {
    font-variation-settings: 'FILL' 1, 'wght' 300, 'GRAD' 0, 'opsz' 24;
  }

  .label {
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    font-weight: 400;
    opacity: 0;
    transform: translateX(-6px);
    transition: opacity 0.15s ease, transform 0.15s ease;
    transition-delay: 0s;
    pointer-events: none;
  }
  .sidebar.expanded .label { opacity: 1; transform: translateX(0); transition-delay: 0.18s; }

  .divider { height: 1px; background: rgba(255,255,255,0.07); margin: 8px; flex-shrink: 0; }
  .spacer { flex: 1; }

  /* ── MAIN ── */
  .main-wrap {
    margin-left: var(--sidebar-w);
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    min-width: 0;
  }

  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 24px;
    height: 56px;
    background: #0d0d0d;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .topbar-left { display: flex; align-items: center; gap: 14px; }
  .nav-arrows { display: flex; gap: 2px; }
  .nav-btn {
    width: 30px; height: 30px;
    border: 1px solid var(--border-light);
    background: transparent;
    border-radius: var(--radius-sm);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: var(--text-secondary);
    transition: all 0.15s;
    font-size: 16px;
  }
  .nav-btn:hover { background: var(--surface2); color: var(--text-primary); }
  .month-label { font-size: 15px; font-weight: 600; letter-spacing: -0.3px; }
  .month-label .year { color: var(--text-muted); font-weight: 400; margin-left: 4px; }
  .today-btn {
    padding: 6px 14px;
    border: 1px solid var(--border-light);
    background: transparent;
    border-radius: var(--radius-sm);
    font-family: 'Inter', sans-serif;
    font-size: 12px; font-weight: 500;
    color: var(--text-secondary);
    cursor: pointer;
    transition: all 0.15s;
  }
  .today-btn:hover { background: var(--surface2); color: var(--text-primary); }

  /* ── PANELS ── */
  .panels { display: flex; flex: 1; overflow: hidden; padding: 16px; gap: 12px; }

  .calendar-panel {
    flex: 1;
    background: var(--surface);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    min-width: 0;
  }

  .cal-header {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    border-bottom: 1px solid var(--border);
    background: var(--surface2);
    border-radius: var(--radius) var(--radius) 0 0;
  }
  .cal-day-name {
    text-align: center;
    padding: 10px 4px;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  .cal-grid {
    flex: 1;
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    grid-template-rows: repeat(6, 1fr);
    overflow: hidden;
    border-radius: 0 0 var(--radius) var(--radius);
  }

  .cal-cell {
    border-right: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    padding: 7px 8px;
    cursor: pointer;
    transition: background 0.12s;
    display: flex;
    flex-direction: column;
    gap: 3px;
  }
  .cal-cell:nth-child(7n) { border-right: none; }
  .cal-cell:nth-last-child(-n+7) { border-bottom: none; }
  .cal-cell:hover { background: var(--accent-dim); }
  .cal-cell.other-month { background: #151515; }
  .cal-cell.other-month .cal-date { color: var(--text-muted); opacity: 0.35; }
  .cal-cell.selected { background: rgba(255,255,255,0.05); }

  .cal-date {
    font-size: 12px;
    font-weight: 500;
    color: var(--text-secondary);
    width: 24px; height: 24px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 50%;
    transition: all 0.12s;
    flex-shrink: 0;
  }
  .cal-cell.today .cal-date { background: white; color: #111; font-weight: 600; }
  .cal-cell.selected:not(.today) .cal-date { border: 1px solid var(--border-light); color: var(--text-primary); }

  .cal-events { display: flex; flex-direction: column; gap: 2px; overflow: hidden; }
  .cal-event-pill {
    font-size: 10px; font-weight: 500;
    padding: 2px 5px;
    border-radius: 3px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    cursor: pointer;
    transition: filter 0.12s;
  }
  .cal-event-pill:hover { filter: brightness(1.3); }

  /* ── DAY PANEL ── */
  .day-panel {
    width: 300px; flex-shrink: 0;
    background: var(--surface);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    display: flex; flex-direction: column;
    overflow: hidden;
  }

  .day-panel-header {
    padding: 18px 20px 14px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    background: var(--surface2);
    border-radius: var(--radius) var(--radius) 0 0;
  }
  .day-panel-weekday {
    font-size: 10px; font-weight: 600;
    letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--text-muted); margin-bottom: 3px;
  }
  .day-panel-date {
    font-size: 40px; font-weight: 300;
    letter-spacing: -2px; color: var(--text-primary); line-height: 1;
  }
  .day-panel-date.is-today { color: white; font-weight: 400; }
  .day-panel-month { font-size: 13px; color: var(--text-secondary); margin-top: 3px; }

  .day-add-btn {
    margin-top: 12px;
    display: flex; align-items: center; justify-content: center;
    gap: 6px; padding: 8px 14px;
    background: white; color: #111;
    border: none; border-radius: var(--radius-sm);
    font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 600;
    cursor: pointer; transition: opacity 0.15s; width: 100%;
    letter-spacing: 0.01em;
  }
  .day-add-btn:hover { opacity: 0.85; }

  .day-scroll {
    flex: 1; overflow-y: auto; position: relative;
    scrollbar-width: thin; scrollbar-color: var(--border) transparent;
  }
  .day-scroll::-webkit-scrollbar { width: 3px; }
  .day-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .time-grid { position: relative; padding-bottom: 16px; }

  .time-row { display: flex; align-items: flex-start; min-height: 56px; position: relative; }
  .time-label {
    width: 50px; flex-shrink: 0;
    padding: 0 10px 0 14px;
    font-size: 10px; font-weight: 500;
    color: var(--text-muted);
    transform: translateY(-7px);
    text-align: right;
    letter-spacing: 0.03em;
    font-variant-numeric: tabular-nums;
  }
  .time-line-area {
    flex: 1;
    border-top: 1px solid var(--border);
    position: relative; min-height: 56px;
    padding-right: 12px;
  }
  .time-row:first-child .time-line-area { border-top: none; }

  .now-line {
    position: absolute; left: 50px; right: 0;
    height: 1px; background: rgba(255,255,255,0.6);
    z-index: 10; pointer-events: none;
  }
  .now-line::before {
    content: '';
    position: absolute; left: -4px; top: -3.5px;
    width: 8px; height: 8px;
    background: white; border-radius: 50%;
  }

  .timed-event {
    position: absolute; left: 0; right: 12px;
    border-radius: 5px; padding: 4px 8px;
    font-size: 11px; font-weight: 500;
    cursor: pointer; overflow: hidden; z-index: 5;
    transition: filter 0.12s, transform 0.12s;
    border-left: 2px solid;
  }
  .timed-event:hover { filter: brightness(1.25); transform: scaleX(0.98); }
  .timed-event-title { font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .timed-event-time { font-size: 10px; opacity: 0.65; margin-top: 1px; }

  /* ── ADD EVENT MODAL ── */
  .event-modal {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.75);
    display: flex; align-items: center; justify-content: center;
    z-index: 300; backdrop-filter: blur(8px);
    opacity: 0; pointer-events: none; transition: opacity 0.2s;
  }
  .event-modal.open { opacity: 1; pointer-events: all; }
  .event-modal-box {
    background: #1e1e1e;
    border: 1px solid var(--border-light);
    border-radius: var(--radius);
    padding: 26px; width: 340px;
    transform: translateY(10px); transition: transform 0.2s;
  }
  .event-modal.open .event-modal-box { transform: translateY(0); }
  .modal-title { font-size: 15px; font-weight: 600; margin-bottom: 18px; letter-spacing: -0.2px; }
  .modal-field { margin-bottom: 13px; }
  .modal-field label { display: block; font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.09em; color: var(--text-muted); margin-bottom: 5px; }
  .modal-field input, .modal-field select {
    width: 100%; padding: 8px 11px;
    border: 1px solid var(--border-light);
    border-radius: var(--radius-sm);
    font-family: 'Inter', sans-serif; font-size: 13px;
    background: var(--surface2); color: var(--text-primary);
    outline: none; transition: border-color 0.15s;
  }
  .modal-field input:focus, .modal-field select:focus { border-color: rgba(255,255,255,0.35); }
  .modal-field select option { background: #222; }
  .modal-row { display: flex; gap: 10px; }
  .modal-row .modal-field { flex: 1; }
  .modal-actions { display: flex; gap: 8px; margin-top: 18px; }
  .modal-save {
    flex: 1; padding: 9px; background: white; color: #111;
    border: none; border-radius: var(--radius-sm);
    font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 600;
    cursor: pointer; transition: opacity 0.15s;
  }
  .modal-save:hover { opacity: 0.85; }
  .modal-cancel {
    padding: 9px 16px; background: transparent; color: var(--text-secondary);
    border: 1px solid var(--border-light); border-radius: var(--radius-sm);
    font-family: 'Inter', sans-serif; font-size: 13px;
    cursor: pointer; transition: background 0.15s;
  }
  .modal-cancel:hover { background: var(--surface2); }

  /* ── EDIT / DELETE MODAL ── */
  .edit-modal {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.75);
    display: flex; align-items: center; justify-content: center;
    z-index: 300; backdrop-filter: blur(8px);
    opacity: 0; pointer-events: none; transition: opacity 0.2s;
  }
  .edit-modal.open { opacity: 1; pointer-events: all; }
  .edit-modal-box {
    background: #1e1e1e;
    border: 1px solid var(--border-light);
    border-radius: var(--radius);
    padding: 26px; width: 340px;
    transform: translateY(10px); transition: transform 0.2s;
  }
  .edit-modal.open .edit-modal-box { transform: translateY(0); }

  .edit-modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 18px;
  }
  .edit-modal-title { font-size: 15px; font-weight: 600; letter-spacing: -0.2px; }

  .edit-color-bar {
    height: 3px;
    border-radius: 2px;
    margin-bottom: 18px;
    transition: background 0.2s;
  }

  .edit-close-btn {
    width: 28px; height: 28px;
    background: var(--surface3);
    border: 1px solid var(--border-light);
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    color: var(--text-muted);
    font-size: 15px;
    transition: background 0.15s, color 0.15s;
    flex-shrink: 0;
  }
  .edit-close-btn:hover { background: var(--border-light); color: var(--text-primary); }

  .edit-actions {
    display: flex;
    gap: 8px;
    margin-top: 18px;
  }
  .edit-save-btn {
    flex: 1; padding: 9px;
    background: white; color: #111;
    border: none; border-radius: var(--radius-sm);
    font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 600;
    cursor: pointer; transition: opacity 0.15s;
  }
  .edit-save-btn:hover { opacity: 0.85; }
  .edit-delete-btn {
    padding: 9px 14px;
    background: transparent;
    color: #e06060;
    border: 1px solid #e0606044;
    border-radius: var(--radius-sm);
    font-family: 'Inter', sans-serif; font-size: 13px;
    cursor: pointer; transition: background 0.15s, border-color 0.15s;
    display: flex; align-items: center; gap: 5px;
  }
  .edit-delete-btn:hover { background: rgba(224,96,96,0.1); border-color: #e06060; }
  .edit-cancel-btn {
    padding: 9px 14px;
    background: transparent; color: var(--text-secondary);
    border: 1px solid var(--border-light); border-radius: var(--radius-sm);
    font-family: 'Inter', sans-serif; font-size: 13px;
    cursor: pointer; transition: background 0.15s;
  }
  .edit-cancel-btn:hover { background: var(--surface2); }
</style>
</head>
<body>

<!-- SIDEBAR -->

  <div class="menu-item menu-toggle" id="menu-toggle">
    <span class="material-symbols-outlined">menu</span>
    <span class="label" style="font-size:15px;font-weight:500;color:white;">Menu</span>
  </div>
  <a href="homepage.html" class="menu-item">

  </a>
</div>

<!-- MAIN -->
<div class="main-wrap">
  <div class="topbar">
    <div class="topbar-left">
      <div class="nav-arrows">
        <button class="nav-btn" id="prevMonth">&#8249;</button>
        <button class="nav-btn" id="nextMonth">&#8250;</button>
      </div>
      <div class="month-label" id="monthLabel">March <span class="year">2026</span></div>
    </div>

  </div>

  <div class="panels">
    <div class="calendar-panel">
      <div class="cal-header" id="calHeader"></div>

<!-- ADD EVENT MODAL -->
<div class="event-modal" id="eventModal">
  <div class="event-modal-box">
    <div class="modal-title">New Event</div>
    <div class="modal-field">
      <label>Event Name</label>
      <input type="text" id="evtTitle" placeholder="e.g. Team standup" />

    <div class="modal-row">

      <label>Color</label>
      <select id="evtColor">
        <option value="#aaaaaa">Silver</option>
        <option value="#eeeeee">White</option>
        <option value="#7a9abf">Steel Blue</option>
        <option value="#8fbc8f">Sage</option>
        <option value="#c49a6c">Amber</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="modal-cancel" id="modalCancel">Cancel</button>
      <button class="modal-save" id="modalSave">Save</button>
    </div>
  </div>
</div>

<!-- EDIT / DELETE MODAL -->
<div class="edit-modal" id="editModal">
  <div class="edit-modal-box">
    <div class="edit-modal-header">
      <div class="edit-modal-title">Edit Event</div>
      <div class="edit-close-btn" id="editCloseBtn">✕</div>
    </div>
    <div class="edit-color-bar" id="editColorBar"></div>
    <div class="modal-field">
      <label>Event Name</label>
      <input type="text" id="editTitle" placeholder="Event name" />
    </div>
    <div class="modal-row">
      <div class="modal-field"><label>Start</label><input type="time" id="editStart" /></div>
      <div class="modal-field"><label>End</label><input type="time" id="editEnd" /></div>
    </div>
    <div class="modal-field">
      <label>Color</label>
      <select id="editColor">
        <option value="#aaaaaa">Silver</option>
        <option value="#eeeeee">White</option>
        <option value="#7a9abf">Steel Blue</option>
        <option value="#8fbc8f">Sage</option>
        <option value="#c49a6c">Amber</option>
      </select>
    </div>
    <div class="edit-actions">
      <button class="edit-cancel-btn" id="editCancelBtn">Cancel</button>
      <button class="edit-delete-btn" id="editDeleteBtn">
        <span class="material-symbols-outlined" style="font-size:15px;">delete</span> Delete
      </button>
      <button class="edit-save-btn" id="editSaveBtn">Save</button>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp }             from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
  import { getFirestore, doc, getDoc, setDoc, updateDoc, deleteField } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCD6MqOQtkVlGuhfMQTMxLl226_9coEU9k",
    authDomain: "omnium-2ebd2.firebaseapp.com",
    projectId: "omnium-2ebd2",
    storageBucket: "omnium-2ebd2.firebasestorage.app",
    messagingSenderId: "816486376253",
    appId: "1:816486376253:web:6433e7e3d3f584ab919b54",
    measurementId: "G-GWSKVGQP21"
  };

  const app  = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db   = getFirestore(app);

  let events     = {};
  let userDocRef = null;

  // Tracks which event is being edited: { dateKey, index }
  let editTarget = null;

  document.getElementById('menu-toggle').addEventListener('click', () => {
    document.getElementById('sidebar').classList.toggle('expanded');
  });

  const DAY_NAMES      = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const DAY_NAMES_LONG = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const MONTH_NAMES    = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const CELL_H         = 56;

  const today = new Date();
  let viewYear     = today.getFullYear();
  let viewMonth    = today.getMonth();
  let selectedDate = new Date(today);

  const dateKey    = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  const isSameDay  = (a,b) => a.getFullYear()===b.getFullYear() && a.getMonth()===b.getMonth() && a.getDate()===b.getDate();
  const timeToMins = t => { const [h,m]=t.split(':').map(Number); return h*60+m; };

  async function saveEvents() {
    if (!userDocRef) return;
    // Delete the field first so removed date keys are truly gone, then rewrite
    await updateDoc(userDocRef, { calendarEvents: deleteField() });
    await setDoc(userDocRef, { calendarEvents: events }, { merge: true });
  }

  // ── Open the edit modal for a specific event ──
  function openEditModal(key, index, e) {
    if (e) e.stopPropagation(); // don't bubble to the cell click
    const ev = events[key][index];
    editTarget = { key, index };

    document.getElementById('editTitle').value = ev.title;
    document.getElementById('editStart').value = ev.start;
    document.getElementById('editEnd').value   = ev.end;
    document.getElementById('editColor').value = ev.color;
    document.getElementById('editColorBar').style.background = ev.color;
    document.getElementById('editModal').classList.add('open');
    setTimeout(() => document.getElementById('editTitle').focus(), 100);
  }

  function closeEditModal() {
    document.getElementById('editModal').classList.remove('open');
    editTarget = null;
  }

  // Update color bar when color picker changes
  document.getElementById('editColor').addEventListener('change', function() {
    document.getElementById('editColorBar').style.background = this.value;
  });

  // Close on backdrop click
  document.getElementById('editModal').addEventListener('click', e => {
    if (e.target === e.currentTarget) closeEditModal();
  });
  document.getElementById('editCloseBtn').addEventListener('click', closeEditModal);
  document.getElementById('editCancelBtn').addEventListener('click', closeEditModal);

  // Save edits
  document.getElementById('editSaveBtn').addEventListener('click', async () => {
    if (!editTarget) return;
    const title = document.getElementById('editTitle').value.trim();
    const start = document.getElementById('editStart').value;
    const end   = document.getElementById('editEnd').value;
    const color = document.getElementById('editColor').value;
    if (!title) { document.getElementById('editTitle').focus(); return; }

    events[editTarget.key][editTarget.index] = { title, start, end, color };
    events[editTarget.key].sort((a,b) => timeToMins(a.start) - timeToMins(b.start));

    closeEditModal();
    await saveEvents();
    renderCalendar();
    renderDayPanel();
  });

  // Delete event
  document.getElementById('editDeleteBtn').addEventListener('click', async () => {
    if (!editTarget) return;
    events[editTarget.key].splice(editTarget.index, 1);
    if (events[editTarget.key].length === 0) delete events[editTarget.key];

    closeEditModal();
    await saveEvents();
    renderCalendar();
    renderDayPanel();
  });

  // ── Calendar grid ──
  function renderCalendar() {
    document.getElementById('monthLabel').innerHTML =
      `${MONTH_NAMES[viewMonth]} <span class="year">${viewYear}</span>`;
    document.getElementById('calHeader').innerHTML =
      DAY_NAMES.map(d => `<div class="cal-day-name">${d}</div>`).join('');

    const grid = document.getElementById('calGrid');
    grid.innerHTML = '';
    const firstDay    = new Date(viewYear, viewMonth, 1).getDay();
    const daysInMonth = new Date(viewYear, viewMonth+1, 0).getDate();
    const daysInPrev  = new Date(viewYear, viewMonth, 0).getDate();

    for (let i = 0; i < 42; i++) {
      const cell = document.createElement('div');
      cell.className = 'cal-cell';
      let d;
      if (i < firstDay) {
        d = new Date(viewYear, viewMonth-1, daysInPrev-firstDay+i+1);
        cell.classList.add('other-month');
      } else if (i-firstDay < daysInMonth) {
        d = new Date(viewYear, viewMonth, i-firstDay+1);
      } else {
        d = new Date(viewYear, viewMonth+1, i-firstDay-daysInMonth+1);
        cell.classList.add('other-month');
      }

      if (isSameDay(d, today))        cell.classList.add('today');
      if (isSameDay(d, selectedDate)) cell.classList.add('selected');

      const num = document.createElement('div');
      num.className   = 'cal-date';
      num.textContent = d.getDate();
      cell.appendChild(num);

      const key = dateKey(d);
      if (events[key]?.length) {
        const evDiv = document.createElement('div');
        evDiv.className = 'cal-events';
        events[key].slice(0,2).forEach((ev, idx) => {
          const p = document.createElement('div');
          p.className    = 'cal-event-pill';
          p.style.cssText = `background:${ev.color}1a;color:${ev.color};`;
          p.textContent  = ev.title;
          // clicking a pill opens the edit modal for that event
          p.addEventListener('click', e => openEditModal(key, idx, e));
          evDiv.appendChild(p);
        });
        if (events[key].length > 2) {
          const more = document.createElement('div');
          more.style.cssText = 'font-size:10px;color:var(--text-muted);padding:1px 4px;';
          more.textContent   = `+${events[key].length-2} more`;
          evDiv.appendChild(more);
        }
        cell.appendChild(evDiv);
      }

      // clicking the cell selects the day (but not if a pill was clicked)
      cell.addEventListener('click', () => {
        selectedDate = new Date(d);
        renderCalendar();
        renderDayPanel();
      });
      grid.appendChild(cell);
    }
  }

  // ── Day panel ──
  function renderDayPanel() {
    const isToday = isSameDay(selectedDate, today);
    document.getElementById('dayWeekday').textContent =
      DAY_NAMES_LONG[selectedDate.getDay()].toUpperCase();
    const el = document.getElementById('dayDate');
    el.textContent = selectedDate.getDate();
    el.className   = 'day-panel-date' + (isToday ? ' is-today' : '');
    document.getElementById('dayMonth').textContent =
      `${MONTH_NAMES[selectedDate.getMonth()]} ${selectedDate.getFullYear()}`;
    renderTimeGrid();
  }

  // ── Time grid ──
  function renderTimeGrid() {
    const grid = document.getElementById('timeGrid');
    grid.innerHTML = '';

    if (isSameDay(selectedDate, today)) {
      const line = document.createElement('div');
      line.className  = 'now-line';
      line.style.top  = ((today.getHours()*60+today.getMinutes())/60*CELL_H) + 'px';
      grid.appendChild(line);
    }

    for (let h = 0; h < 24; h++) {
      const row  = document.createElement('div');
      row.className  = 'time-row';
      const lbl  = document.createElement('div');
      lbl.className  = 'time-label';
      if (h > 0) lbl.textContent = `${h===12?12:h%12} ${h<12?'AM':'PM'}`;
      const area = document.createElement('div');
      area.className = 'time-line-area';
      row.appendChild(lbl);
      row.appendChild(area);
      grid.appendChild(row);
    }

    const key = dateKey(selectedDate);
    (events[key] || []).forEach((ev, idx) => {
      const el = document.createElement('div');
      el.className    = 'timed-event';
      el.style.cssText = `top:${timeToMins(ev.start)/60*CELL_H}px;height:${Math.max((timeToMins(ev.end)-timeToMins(ev.start))/60*CELL_H,22)}px;background:${ev.color}14;border-left-color:${ev.color};color:${ev.color};`;
      el.innerHTML    = `<div class="timed-event-title">${ev.title}</div><div class="timed-event-time">${ev.start} – ${ev.end}</div>`;
      // clicking a timed event opens the edit modal
      el.addEventListener('click', e => openEditModal(key, idx, e));
      grid.appendChild(el);
    });

    const scroll   = document.getElementById('dayScroll');
    const nowMins  = today.getHours()*60+today.getMinutes();
    scroll.scrollTop = isSameDay(selectedDate, today)
      ? Math.max(0, (nowMins/60-1)*CELL_H)
      : 8*CELL_H;
  }

  // ── Nav ──
  document.getElementById('prevMonth').addEventListener('click', () => {
    if (--viewMonth < 0) { viewMonth = 11; viewYear--; }
    renderCalendar();
  });
  document.getElementById('nextMonth').addEventListener('click', () => {
    if (++viewMonth > 11) { viewMonth = 0; viewYear++; }
    renderCalendar();
  });
  document.getElementById('goToday').addEventListener('click', () => {
    viewYear = today.getFullYear(); viewMonth = today.getMonth();
    selectedDate = new Date(today);
    renderCalendar(); renderDayPanel();
  });

  // ── Add event modal ──
  document.getElementById('addEventBtn').addEventListener('click', () => {
    document.getElementById('evtTitle').value = '';
    document.getElementById('eventModal').classList.add('open');
    setTimeout(() => document.getElementById('evtTitle').focus(), 100);
  });
  document.getElementById('modalCancel').addEventListener('click', () =>
    document.getElementById('eventModal').classList.remove('open'));
  document.getElementById('eventModal').addEventListener('click', e => {
    if (e.target === e.currentTarget) e.currentTarget.classList.remove('open');
  });

  document.getElementById('modalSave').addEventListener('click', async () => {
    const title = document.getElementById('evtTitle').value.trim();
    const start = document.getElementById('evtStart').value;
    const end   = document.getElementById('evtEnd').value;
    const color = document.getElementById('evtColor').value;
    if (!title) { document.getElementById('evtTitle').focus(); return; }

    const key = dateKey(selectedDate);
    if (!events[key]) events[key] = [];
    events[key].push({ title, start, end, color });
    events[key].sort((a,b) => timeToMins(a.start) - timeToMins(b.start));

    document.getElementById('eventModal').classList.remove('open');
    await saveEvents();
    renderCalendar();
    renderDayPanel();
  });

  // ── Auth ──
  onAuthStateChanged(auth, async (user) => {
    if (!user) { window.location.href = "index.html"; return; }
    userDocRef = doc(db, "users", user.uid);
    const snap = await getDoc(userDocRef);
    if (snap.exists()) events = snap.data().calendarEvents || {};
    renderCalendar();
    renderDayPanel();
  });
</script>
</body>
</html>
