<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Pomodoro Timer</title>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #000;
  --card: #111;
  --accent: #FFD54A;
  --accent-2: #B90101;
  --muted: #9aa6b2;
  --glass: rgba(255,255,255,0.03);
}

*,
*::before,
*::after {
  box-sizing: border-box;
}

html,
body {
  height: 100%;
}

body {
  margin: 0;
  display: flex;
  flex-direction: row;
  background: var(--bg);
  color: #e6eef6;
  font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
  min-height: 100vh;
}

/* ── SIDEBAR ── */
.menu-box {
  padding: 12px 8px;
  height: 100vh;
  width: 64px;
  background-color: #111;
  transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  display: flex;
  flex-direction: column;
  gap: 4px;
  overflow: hidden;
  position: fixed;
  top: 0;
  left: 0;
  z-index: 200;
}

.menu-box.expanded {
  width: 220px;
}

.menu-item {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 8px;
  border-radius: 10px;
  cursor: pointer;
  text-decoration: none;
  color: rgba(255,255,255,0.6);
  transition: background 0.2s ease, color 0.2s ease;
  white-space: nowrap;
  min-height: 48px;
  position: relative;
  flex-shrink: 0;
}

.menu-item:hover {
  background: rgba(255,255,255,0.07);
  color: white;
}

.menu-item.active {
  color: white;
}

.menu-item.active::before {
  content: "";
  position: absolute;
  left: -8px;
  top: 50%;
  transform: translateY(-50%);
  height: 28px;
  width: 3px;
  background-color: white;
  border-radius: 2px;
}

.menu-toggle {
  margin-bottom: 16px;
}

.menu-box .material-symbols-outlined {
  font-size: 28px;
  flex-shrink: 0;
  font-variation-settings: 'FILL' 0, 'wght' 250, 'GRAD' 0, 'opsz' 24;
}

.menu-box .menu-item.active .material-symbols-outlined {
  font-variation-settings: 'FILL' 1, 'wght' 300, 'GRAD' 0, 'opsz' 24;
}

.label {
  font-family: "DM Sans", sans-serif;
  font-size: 15px;
  font-weight: 400;
  letter-spacing: 0.01em;
  opacity: 0;
  transform: translateX(-6px);
  transition: opacity 0.15s ease, transform 0.15s ease;
  transition-delay: 0s;
  pointer-events: none;
}

.menu-box.expanded .label {
  opacity: 1;
  transform: translateX(0);
  transition-delay: 0.18s;
}

.nav-divider {
  height: 1px;
  background: rgba(255,255,255,0.08);
  margin: 8px;
  flex-shrink: 0;
}

.spacer {
  flex: 1;
}

/* ── BOTTOM NAV (mobile only) ── */
.bottom-nav {
  display: none;
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  z-index: 200;
  background: #111;
  border-top: 1px solid rgba(255,255,255,0.08);
  height: 64px;
  padding-bottom: env(safe-area-inset-bottom);
}

.bottom-nav-inner {
  display: flex;
  align-items: center;
  justify-content: space-around;
  height: 64px;
}

.bottom-nav-item {
  display: flex;
  align-items: center;
  justify-content: center;
  flex: 1;
  text-decoration: none;
  color: rgba(255,255,255,0.5);
  padding: 8px 0;
  transition: color 0.2s ease;
  cursor: pointer;
}

.bottom-nav-item.active {
  color: white;
}

.bottom-nav-item .material-symbols-outlined {
  font-size: 30px;
  font-variation-settings: 'FILL' 0, 'wght' 250, 'GRAD' 0, 'opsz' 24;
}

.bottom-nav-item.active .material-symbols-outlined {
  font-variation-settings: 'FILL' 1, 'wght' 300, 'GRAD' 0, 'opsz' 24;
}

/* ── MAIN CONTENT ── */
.main-content {
  margin-left: 64px;
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  padding: 24px 0 48px 0;
  min-height: 100vh;
}

.card {
  width: 560px;
  height: calc(100vh - 120px);
  background: var(--card);
  border-radius: 24px;
  padding: 48px 40px;
  box-shadow: 0 20px 60px rgba(2,6,23,0.7);
  border: 1px solid rgba(255,255,255,0.08);
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}

h1 {
  margin: 0 0 12px 0;
  font-size: 32px;
  letter-spacing: 0.3px;
}

p.lead {
  margin: 0 0 28px 0;
  color: var(--muted);
  font-size: 18px;
}

.timer-display {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  margin-bottom: 30px;
}

.big-time {
  font-weight: 700;
  font-size: 80px;
  letter-spacing: 1.5px;
}

.session {
  text-transform: uppercase;
  font-size: 16px;
  color: var(--muted);
  background: var(--glass);
  padding: 12px 16px;
  border-radius: 12px;
}

.controls {
  display: flex;
  gap: 16px;
  margin-bottom: 24px;
}

button {
  flex: 1;
  padding: 16px 18px;
  border-radius: 14px;
  border: 0;
  cursor: pointer;
  font-weight: 600;
  background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
  color: inherit;
  font-size: 18px;
}

button.primary {
  background: var(--accent);
  box-shadow: 0 6px 20px rgba(255,213,74,0.25);
  color: #000;
}

button.secondary {
  background: var(--accent-2);
  color: #fff;
}

.settings {
  display: flex;
  gap: 16px;
  justify-content: space-between;
  margin-bottom: 24px;
}

.setting {
  flex: 1;
  background: rgba(255,255,255,0.02);
  padding: 12px;
  border-radius: 12px;
  text-align: center;
}

.setting label {
  display: block;
  font-size: 15px;
  color: var(--muted);
  margin-bottom: 10px;
}

.setting input[type="number"] {
  width: 100%;
  padding: 10px 12px;
  border-radius: 10px;
  background: transparent;
  border: 1px solid rgba(255,255,255,0.06);
  color: inherit;
  font-weight: 700;
  font-size: 20px;
  text-align: center;
}

.progress-wrap {
  height: 16px;
  background: rgba(255,255,255,0.05);
  border-radius: 999px;
  overflow: hidden;
  margin-bottom: 10px;
}

.progress {
  height: 100%;
  width: 0%;
  border-radius: 999px;
  transition: width 0.3s linear;
  background: var(--accent);
}

.footer {
  margin-top: 14px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  color: var(--muted);
  font-size: 16px;
}

.small {
  font-size: 15px;
  color: var(--muted);
}

/* ── MOBILE ── */
@media (max-width: 600px) {
  .menu-box {
    display: none;
  }

  .bottom-nav {
    display: block;
  }

  .main-content {
    margin-left: 0;
    padding: 16px 16px calc(64px + env(safe-area-inset-bottom) + 16px) 16px;
    justify-content: flex-start;
  }

  .card {
    width: 100%;
    height: auto;
    min-height: 0;
    padding: 28px 20px;
    border-radius: 18px;
  }

  h1 {
    font-size: 24px;
  }

  p.lead {
    font-size: 15px;
    margin-bottom: 20px;
  }

  .big-time {
    font-size: 60px;
  }

  .session {
    font-size: 14px;
    padding: 10px 12px;
  }

  .timer-display {
    margin-bottom: 20px;
  }

  .controls {
    gap: 10px;
    margin-bottom: 18px;
  }

  button {
    padding: 14px 10px;
    font-size: 15px;
    border-radius: 12px;
  }

  .settings {
    gap: 10px;
    margin-bottom: 18px;
  }

  .setting label {
    font-size: 13px;
  }

  .setting input[type="number"] {
    font-size: 18px;
    padding: 8px;
  }

  .footer {
    font-size: 13px;
  }

  .small {
    font-size: 13px;
  }
}
</style>
</head>
<body>

<!-- ── SIDEBAR (desktop) ── -->
<div class="menu-box" id="menu-box">
  <div class="menu-item menu-toggle" id="menu-toggle">
    <span class="material-symbols-outlined">menu</span>
    <span class="label" style="font-size:17px; font-weight:500; color:white;">Menu</span>
  </div>
  <a href="homepage.html" class="menu-item">
    <span class="material-symbols-outlined">home</span>
    <span class="label">Home</span>
  </a>
  <a href="calendar.html" class="menu-item">
    <span class="material-symbols-outlined">calendar_month</span>
    <span class="label">Calendar</span>
  </a>
  <a href="notes.html" class="menu-item">
    <span class="material-symbols-outlined">assignment</span>
    <span class="label">Assignments</span>
  </a>
  <a href="clock.html" class="menu-item active">
    <span class="material-symbols-outlined">timer</span>
    <span class="label">Timer</span>
  </a>
  <div class="spacer"></div>
  <div class="nav-divider"></div>
  <a href="settings.html" class="menu-item">
    <span class="material-symbols-outlined">settings</span>
    <span class="label">Settings</span>
  </a>
</div>

<!-- ── BOTTOM NAV (mobile) ── -->
<nav class="bottom-nav">
  <div class="bottom-nav-inner">
    <a href="homepage.html" class="bottom-nav-item">
      <span class="material-symbols-outlined">home</span>
    </a>
    <a href="calendar.html" class="bottom-nav-item">
      <span class="material-symbols-outlined">calendar_month</span>
    </a>
    <a href="notes.html" class="bottom-nav-item">
      <span class="material-symbols-outlined">assignment</span>
    </a>
    <a href="clock.html" class="bottom-nav-item active">
      <span class="material-symbols-outlined">timer</span>
    </a>
    <a href="settings.html" class="bottom-nav-item">
      <span class="material-symbols-outlined">settings</span>
    </a>
  </div>
</nav>

<!-- ── main content ── -->
<div class="main-content">
  <div class="card" role="application" aria-label="Pomodoro timer">
    <h1>Pomodoro Timer</h1>
    <p class="lead">Focus sessions + short breaks. Adjust lengths, then Start.</p>

    <div class="timer-display">
      <div class="big-time" id="timeDisplay">25:00</div>
      <div class="session" id="sessionLabel">WORK</div>
    </div>

    <div class="controls">
      <button id="startBtn" class="primary">Start</button>
      <button id="pauseBtn" class="secondary">Pause</button>
      <button id="resetBtn">Reset</button>
    </div>

    <div class="settings">
      <div class="setting">
        <label for="workInput">Work (minutes)</label>
        <input id="workInput" type="number" min="1" max="180" value="25" />
      </div>
      <div class="setting">
        <label for="breakInput">Break (minutes)</label>
        <input id="breakInput" type="number" min="1" max="60" value="5" />
      </div>
    </div>

    <div class="progress-wrap">
      <div id="progressBar" class="progress"></div>
    </div>

    <div class="footer">
      <div class="small" id="cycles">Sessions completed: 0</div>
      <div class="small">Auto-switch: <strong id="autoSwitch">On</strong></div>
    </div>
  </div>
</div>

<script>
  document.getElementById('menu-toggle').addEventListener('click', () => {
    document.getElementById('menu-box').classList.toggle('expanded');
  });
</script>

<script>
(() => {
  const uid = localStorage.getItem('uid') || 'defaultUser';
  const dailyLogKey = `pomodoroDailyLog_${uid}`;
  const timerStateKey = `pomodoroState_${uid}`;

  const timeDisplay  = document.getElementById('timeDisplay');
  const sessionLabel = document.getElementById('sessionLabel');
  const startBtn     = document.getElementById('startBtn');
  const pauseBtn     = document.getElementById('pauseBtn');
  const resetBtn     = document.getElementById('resetBtn');
  const workInput    = document.getElementById('workInput');
  const breakInput   = document.getElementById('breakInput');
  const progressBar  = document.getElementById('progressBar');
  const cyclesEl     = document.getElementById('cycles');

  let workSeconds = 0;
  let breakSeconds = 0;
  let remaining = 0;
  let mode = 'work';
  let timerInterval = null;
  let running = false;
  let paused = false;
  let sessionsCompleted = 0;

  function fmt(s) {
    const m = Math.floor(s / 60);
    const sec = s % 60;
    return `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
  }

  function updateUI() {
    timeDisplay.textContent = fmt(Math.max(0, Math.floor(remaining)));
    sessionLabel.textContent = mode.toUpperCase();
    const total = mode === 'work' ? workSeconds : breakSeconds;
    const width = total > 0 ? ((total - remaining) / total) * 100 : 0;
    progressBar.style.width = Math.max(0, Math.min(100, width)) + '%';
    cyclesEl.textContent = `Sessions completed: ${sessionsCompleted}`;
    startBtn.disabled = running && !paused;
    pauseBtn.disabled = !running || paused;
  }

  function recordSessionTime(sessionMode, minutes) {
    const today = new Date().toLocaleDateString();
    let dailyLog = JSON.parse(localStorage.getItem(dailyLogKey)) || {};
    if (!dailyLog[today]) dailyLog[today] = { work: 0, break: 0 };
    dailyLog[today][sessionMode] += minutes;
    localStorage.setItem(dailyLogKey, JSON.stringify(dailyLog));
  }

  function saveTimerState() {
    const payload = {
      remaining: Math.max(0, Math.floor(remaining)),
      mode,
      workInput: workInput.value,
      breakInput: breakInput.value,
      sessionsCompleted,
      running,
      paused,
      timestamp: Date.now()
    };
    localStorage.setItem(timerStateKey, JSON.stringify(payload));
  }

  function clearTimerState() {
    localStorage.removeItem(timerStateKey);
  }

  function finishSessionActions() {
    const completedMinutes = (mode === 'work' ? workSeconds : breakSeconds) / 60;
    recordSessionTime(mode, completedMinutes);
    if (mode === 'work') sessionsCompleted++;
  }

  function switchMode() {
    finishSessionActions();
    mode = mode === 'work' ? 'break' : 'work';
    remaining = mode === 'work' ? workSeconds : breakSeconds;
    saveTimerState();
    updateUI();
  }

  function tick() {
    remaining -= 1;
    if (remaining <= 0) { playBeep(); switchMode(); }
    else saveTimerState();
    updateUI();
  }

  function playBeep() {
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.type = 'sine';
      o.frequency.value = 880;
      o.connect(g);
      g.connect(ctx.destination);
      g.gain.setValueAtTime(0.08, ctx.currentTime);
      o.start();
      o.stop(ctx.currentTime + 0.25);
    } catch(e) {}
  }

  function startTimer() {
    if (running && !paused) return;
    running = true;
    paused = false;
    saveTimerState();
    clearInterval(timerInterval);
    timerInterval = setInterval(tick, 1000);
    updateUI();
  }

  function pauseTimer() {
    paused = true;
    running = false;
    clearInterval(timerInterval);
    saveTimerState();
    updateUI();
  }

  function resetTimer() {
    paused = false;
    running = false;
    clearInterval(timerInterval);
    workSeconds = parseInt(workInput.value, 10) * 60;
    breakSeconds = parseInt(breakInput.value, 10) * 60;
    mode = 'work';
    remaining = workSeconds;
    sessionsCompleted = 0;
    clearTimerState();
    updateUI();
  }

  function loadTimerState() {
    workSeconds = parseInt(workInput.value, 10) * 60;
    breakSeconds = parseInt(breakInput.value, 10) * 60;
    const saved = localStorage.getItem(timerStateKey);
    if (!saved) {
      remaining = workSeconds;
      mode = 'work';
      running = false;
      paused = false;
      sessionsCompleted = 0;
      updateUI();
      return;
    }
    const state = JSON.parse(saved);
    if (state.workInput) workInput.value = state.workInput;
    if (state.breakInput) breakInput.value = state.breakInput;
    workSeconds = parseInt(workInput.value, 10) * 60;
    breakSeconds = parseInt(breakInput.value, 10) * 60;
    mode = state.mode || 'work';
    sessionsCompleted = state.sessionsCompleted || 0;
    paused = !!state.paused;
    const wasRunning = !!state.running;
    const now = Date.now();
    const elapsed = Math.floor((now - (state.timestamp || now)) / 1000);
    if (wasRunning && !paused) {
      let newRemaining = (typeof state.remaining === 'number'
        ? state.remaining
        : (mode === 'work' ? workSeconds : breakSeconds)) - elapsed;
      while (newRemaining <= 0) {
        const finishedMinutes = (mode === 'work' ? workSeconds : breakSeconds) / 60;
        recordSessionTime(mode, finishedMinutes);
        if (mode === 'work') sessionsCompleted++;
        mode = mode === 'work' ? 'break' : 'work';
        newRemaining += (mode === 'work' ? workSeconds : breakSeconds);
      }
      remaining = newRemaining;
      running = true;
      paused = false;
      clearInterval(timerInterval);
      timerInterval = setInterval(tick, 1000);
      saveTimerState();
      updateUI();
    } else {
      remaining = (typeof state.remaining === 'number')
        ? state.remaining
        : (mode === 'work' ? workSeconds : breakSeconds);
      running = false;
      updateUI();
    }
  }

  document.addEventListener('visibilitychange', () => {
    if (document.hidden) saveTimerState();
    else loadTimerState();
  });

  startBtn.addEventListener('click', () => {
    workSeconds = parseInt(workInput.value, 10) * 60;
    breakSeconds = parseInt(breakInput.value, 10) * 60;
    if (!running || paused) {
      if (!remaining || remaining <= 0) { remaining = workSeconds; mode = 'work'; }
      startTimer();
    }
  });

  pauseBtn.addEventListener('click', () => pauseTimer());
  resetBtn.addEventListener('click', () => resetTimer());
  workInput.addEventListener('change', () => resetTimer());
  breakInput.addEventListener('change', () => resetTimer());

  loadTimerState();
  updateUI();
})();
</script>

</body>
</html>
